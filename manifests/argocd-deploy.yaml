apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
    spec:
      containers:
        - name: argocd-server
          image: quay.io/argoproj/argocd:v2.10.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          args:
            - /usr/local/bin/argocd-server
            - --insecure
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 60          # Increased from 10s to give more startup time
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6              # Allows more failures before marking unready
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 90          # Increased from 30s
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6