apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk-example
spec:
  replicas: 1                               # example: different replica count for test
  template:
    spec:
      containers:
      - name: nginx                           # MUST match base container name
        image: splunk/splunk:latest           # override image
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"