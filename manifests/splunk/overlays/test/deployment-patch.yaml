apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk-example
spec:
  replicas: 1              
  template:
    spec:
      containers:
      - name: nginx        
        image: nginx:1.14.2
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"