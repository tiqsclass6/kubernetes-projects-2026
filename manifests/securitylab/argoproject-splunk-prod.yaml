apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: splunk-prod
  namespace: argocd

spec:
  description: "Splunk PROD: only deploy to splunk namespace"

  sourceRepos:
    - https://github.com/tiqsclass6/kubernetes-projects-2026.git

  destinations:
    - namespace: splunk
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"