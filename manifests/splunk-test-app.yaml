apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: splunk-test
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/tiqsclass6/kubernetes-projects-2026.git
    targetRevision: project-2
    path: manifests/splunk/overlays/test

  destination:
    server: https://kubernetes.default.svc
    namespace: splunk-test

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# kubectl apply -f splunk-test-app.yaml