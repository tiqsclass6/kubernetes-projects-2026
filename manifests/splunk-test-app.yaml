apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: splunk-test
  namespace: argocd
spec:
  project: splunk-test

  source:
    repoURL: https://github.com/tiqsclass6/kubernetes-projects-2026.git
    targetRevision: project-2
    path: splunk/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: splunk-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true